<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finanzas CEPPE — Dashboard</title>
<style>
  :root{
    --bg:#f2f1ee;
    --card:#ffffff;
    --ink:#111111;
    --muted:#8a8a8a;
    --line:#e7e6e2;
    --azul:#037a9c;
    --azul2:#254781;
    --amarillo:#ebbc38;
    --green:#2e7d55;
    --green-bg:#e8f3ec;
    --red:#d64545;
    --red-bg:#fbe9e9;
    --radius:16px;
    --mono:"SF Mono",ui-monospace,"Cascadia Mono","Roboto Mono",Menlo,Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);font-family:var(--sans);color:var(--ink);
    -webkit-font-smoothing:antialiased;padding:24px 18px 70px;max-width:1000px;margin:0 auto}

  .top h1{font-size:24px;font-weight:700;letter-spacing:-.3px}
  .top .sub{font-family:var(--mono);font-size:12px;color:var(--muted);margin-top:3px}

  /* filtros */
  .filters{display:flex;flex-wrap:wrap;gap:10px;margin:20px 0 4px;align-items:flex-end}
  .fgroup{display:flex;flex-direction:column;gap:5px}
  .fgroup label{font-family:var(--mono);font-size:10px;letter-spacing:.6px;color:var(--muted);text-transform:uppercase}
  select,input[type=date]{font-family:var(--sans);font-size:14px;padding:9px 12px;border:1px solid var(--line);
    border-radius:10px;background:#fff;color:var(--ink);outline:none}
  select:focus,input:focus{border-color:#b9b8b4}

  /* tabs */
  .tabs{display:inline-flex;background:#e9e8e4;border-radius:11px;padding:4px;gap:4px;margin:22px 0 16px}
  .tabs button{font-family:var(--sans);font-size:14px;font-weight:600;padding:9px 22px;border:none;
    border-radius:8px;background:transparent;color:var(--muted);cursor:pointer;transition:.12s}
  .tabs button.on-ing{background:var(--green-bg);color:var(--green)}
  .tabs button.on-gas{background:var(--red-bg);color:var(--red)}

  /* metric cards top */
  .cards{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
  .card{background:var(--card);border-radius:var(--radius);padding:18px;border:.5px solid var(--line)}
  .card .lbl{font-family:var(--mono);font-size:10px;letter-spacing:.6px;color:var(--muted);text-transform:uppercase;margin-bottom:8px}
  .card .val{font-size:26px;font-weight:600;letter-spacing:-.5px}
  .card .val.ing{color:var(--green)} .card .val.gas{color:var(--red)} .card .val.bal{color:var(--azul)}
  .card .foot{font-size:11px;color:var(--muted);margin-top:5px}

  .section{background:var(--card);border-radius:var(--radius);padding:20px;border:.5px solid var(--line);margin-bottom:16px}
  .section h2{font-family:var(--mono);font-size:12px;letter-spacing:.7px;color:var(--muted);text-transform:uppercase;margin-bottom:16px}

  /* distribucion */
  .barrow{display:flex;align-items:center;gap:12px;margin-bottom:11px}
  .barlbl{font-size:13px;min-width:150px;display:flex;align-items:center;gap:8px;color:#333}
  .dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
  .track{flex:1;height:20px;background:#f4f3f0;border-radius:5px;overflow:hidden}
  .fill{height:100%;border-radius:5px;transition:width .5s cubic-bezier(.2,.8,.2,1)}
  .barval{font-size:13px;font-weight:600;min-width:110px;text-align:right;font-variant-numeric:tabular-nums}
  .barpct{font-size:11px;color:var(--muted);min-width:44px;text-align:right}

  /* mes a mes */
  .months{display:grid;grid-template-columns:repeat(7,1fr);gap:7px}
  .mcard{background:#faf9f7;border-radius:10px;padding:11px 8px;text-align:center}
  .mcard .m{font-family:var(--mono);font-size:10px;color:var(--muted);text-transform:uppercase;margin-bottom:5px}
  .mcard .v{font-size:14px;font-weight:600}
  .mbar{height:4px;border-radius:2px;margin-top:7px}

  /* tabla detalle */
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{text-align:left;padding:8px;font-family:var(--mono);font-size:10px;letter-spacing:.4px;color:var(--muted);
    text-transform:uppercase;border-bottom:.5px solid var(--line)}
  th.num,td.num{text-align:right;font-variant-numeric:tabular-nums}
  td{padding:9px 8px;border-bottom:.5px solid var(--line)}
  tr:last-child td{border-bottom:none}
  .tag{display:inline-block;font-size:11px;padding:2px 8px;border-radius:6px;background:#f0efec;color:#555}

  .loading{text-align:center;padding:60px 20px;color:var(--muted);font-family:var(--mono);font-size:13px}
  .empty{text-align:center;padding:40px;color:var(--muted);font-size:13px}
  .err{background:var(--red-bg);color:var(--red);padding:14px;border-radius:10px;font-size:13px;margin-top:16px}

  .refresh{font-family:var(--sans);font-size:13px;padding:9px 16px;border:1px solid var(--line);
    border-radius:10px;background:#fff;cursor:pointer;color:#333}
  .refresh:hover{border-color:#b9b8b4}

  @media(max-width:680px){
    .cards{grid-template-columns:1fr}
    .months{grid-template-columns:repeat(4,1fr)}
    .barlbl{min-width:110px;font-size:12px}
    .barval{min-width:80px;font-size:12px}
  }
</style>
</head>
<body>

  <div class="top" style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap">
    <div>
      <h1>Finanzas CEPPE</h1>
      <div class="sub" id="sub">Cargando datos en vivo…</div>
    </div>
    <button class="refresh" onclick="cargar()">↻ Actualizar</button>
  </div>

  <div class="filters">
    <div class="fgroup">
      <label>Unidad</label>
      <select id="fUnidad" onchange="render()">
        <option value="">Todas (CEPPE Group)</option>
      </select>
    </div>
    <div class="fgroup">
      <label>Desde</label>
      <input type="date" id="fDesde" onchange="render()">
    </div>
    <div class="fgroup">
      <label>Hasta</label>
      <input type="date" id="fHasta" onchange="render()">
    </div>
    <div class="fgroup">
      <label>Rango rápido</label>
      <select id="fRango" onchange="rangoRapido()">
        <option value="ytd">Todo el año</option>
        <option value="mes">Este mes</option>
        <option value="mesant">Mes anterior</option>
        <option value="30">Últimos 30 días</option>
      </select>
    </div>
  </div>

  <div class="tabs" id="tabs">
    <button data-tab="ingreso" class="on-ing">Ingresos</button>
    <button data-tab="gasto">Gastos</button>
  </div>

  <div id="content"><div class="loading">Cargando datos en vivo desde Google Sheets…</div></div>

<script>
const ENDPOINT = "https://script.google.com/macros/s/AKfycbw-5SF_I_ES5gFyUIC7KmYxQIuoZzWMP53TS9nHi5M-nswAiDBUI9lStqYs71r7rGnH/exec";

const COLORS = ['#037a9c','#254781','#8b1a6b','#3a9e5c','#9a6a00','#c07030','#8e6abf','#d64545'];
const MESES = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];

let DATA = [];
let tab = "ingreso";
let ordenMov = "monto"; // "monto" o "fecha"

async function cargar(){
  document.getElementById('content').innerHTML='<div class="loading">Cargando…</div>';
  try{
    const res = await fetch(ENDPOINT);
    DATA = await res.json();
    DATA.forEach(r=>{
      r.monto = Number(r.monto)||0;
      r.monto_usd = Number(r.monto_usd)||r.monto;
      r.fecha = String(r.fecha).slice(0,10);
    });
    poblarUnidades();
    setRangoDefault();
    document.getElementById('sub').textContent =
      DATA.length+' movimientos · actualizado '+new Date().toLocaleTimeString('es-VE',{hour:'2-digit',minute:'2-digit'});
    render();
  }catch(e){
    document.getElementById('content').innerHTML=
      '<div class="err">No se pudo cargar la data. Revisa que el Apps Script esté publicado como "Cualquier persona". Detalle: '+e+'</div>';
  }
}

function poblarUnidades(){
  const sel=document.getElementById('fUnidad');
  const uni=[...new Set(DATA.map(r=>r.unidad))].sort();
  sel.innerHTML='<option value="">Todas (CEPPE Group)</option>'+
    uni.map(u=>`<option value="${u}">${u}</option>`).join('');
}

function setRangoDefault(){
  const fechas=DATA.map(r=>r.fecha).filter(Boolean).sort();
  if(fechas.length){
    document.getElementById('fDesde').value=fechas[0];
    document.getElementById('fHasta').value=fechas[fechas.length-1];
  }
}
function rangoRapido(){
  const v=document.getElementById('fRango').value;
  const hoy=new Date();
  const fmt=d=>d.toISOString().slice(0,10);
  const fechas=DATA.map(r=>r.fecha).filter(Boolean).sort();
  let desde,hasta=fmt(hoy);
  if(v==='ytd'){ desde=fechas[0]; hasta=fechas[fechas.length-1]; }
  else if(v==='mes'){ desde=fmt(new Date(hoy.getFullYear(),hoy.getMonth(),1)); }
  else if(v==='mesant'){ desde=fmt(new Date(hoy.getFullYear(),hoy.getMonth()-1,1)); hasta=fmt(new Date(hoy.getFullYear(),hoy.getMonth(),0)); }
  else if(v==='30'){ const d=new Date(hoy); d.setDate(d.getDate()-30); desde=fmt(d); }
  document.getElementById('fDesde').value=desde;
  document.getElementById('fHasta').value=hasta;
  render();
}

document.querySelectorAll('#tabs button').forEach(b=>b.addEventListener('click',()=>{
  tab=b.dataset.tab;
  document.querySelectorAll('#tabs button').forEach(x=>x.classList.remove('on-ing','on-gas'));
  b.classList.add(tab==='ingreso'?'on-ing':'on-gas');
  render();
}));

function filtrar(){
  const u=document.getElementById('fUnidad').value;
  const d=document.getElementById('fDesde').value;
  const h=document.getElementById('fHasta').value;
  return DATA.filter(r=>
    r.tipo===tab &&
    (!u || r.unidad===u) &&
    (!d || r.fecha>=d) &&
    (!h || r.fecha<=h)
  );
}

function money(n){return '$'+n.toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0});}

function cambiarOrden(){
  ordenMov=document.getElementById('ordenMov').value;
  render();
}

function render(){
  if(!DATA.length) return;
  const rows=filtrar();
  const esIng=tab==='ingreso';
  const acc=esIng?'var(--green)':'var(--red)';

  // totales del periodo (ambos tipos, respetando unidad+fecha)
  const u=document.getElementById('fUnidad').value;
  const d=document.getElementById('fDesde').value;
  const h=document.getElementById('fHasta').value;
  const enRango=r=>(!u||r.unidad===u)&&(!d||r.fecha>=d)&&(!h||r.fecha<=h);
  const totIng=DATA.filter(r=>r.tipo==='ingreso'&&enRango(r)).reduce((a,r)=>a+r.monto_usd,0);
  const totGas=DATA.filter(r=>r.tipo==='gasto'&&enRango(r)).reduce((a,r)=>a+r.monto_usd,0);
  const bal=totIng-totGas;

  let html='';

  // CARDS
  html+=`<div class="cards">
    <div class="card"><div class="lbl">Total ingresos</div><div class="val ing">${money(totIng)}</div><div class="foot">en el período</div></div>
    <div class="card"><div class="lbl">Total gastos</div><div class="val gas">${money(totGas)}</div><div class="foot">en el período</div></div>
    <div class="card"><div class="lbl">Balance</div><div class="val bal">${money(bal)}</div><div class="foot">ingresos − gastos</div></div>
  </div>`;

  const total=rows.reduce((a,r)=>a+r.monto_usd,0);

  if(!rows.length){
    html+=`<div class="section"><div class="empty">No hay ${esIng?'ingresos':'gastos'} en este período o unidad.</div></div>`;
    document.getElementById('content').innerHTML=html;
    return;
  }

  // DISTRIBUCION por unidad (o por categoria/motivo si ya se filtró una unidad)
  const agrupaPor = u ? (esIng?'motivo':'categoria') : 'unidad';
  const grupos={};
  rows.forEach(r=>{
    let k=r[agrupaPor]||'(sin especificar)';
    if(agrupaPor==='categoria' && !r.categoria) k=r.motivo||'(sin categoría)';
    grupos[k]=(grupos[k]||0)+r.monto_usd;
  });
  const ranked=Object.entries(grupos).sort((a,b)=>b[1]-a[1]);
  const max=ranked[0][1];
  const tituloDist = u ? (esIng?'Distribución por concepto':'Distribución por categoría') : 'Distribución por unidad';

  html+=`<div class="section"><h2>${tituloDist} · ${money(total)}</h2>`;
  ranked.forEach(([k,v],i)=>{
    const pct=(v/total*100).toFixed(1);
    const w=(v/max*100).toFixed(0);
    const c=COLORS[i%COLORS.length];
    html+=`<div class="barrow">
      <div class="barlbl"><span class="dot" style="background:${c}"></span>${k}</div>
      <div class="track"><div class="fill" style="width:${w}%;background:${c}"></div></div>
      <div class="barval">${money(v)}</div>
      <div class="barpct">${pct}%</div>
    </div>`;
  });
  html+=`</div>`;

  // MES A MES
  const porMes={};
  rows.forEach(r=>{
    const m=parseInt(r.fecha.slice(5,7))-1;
    if(m>=0&&m<12) porMes[m]=(porMes[m]||0)+r.monto_usd;
  });
  const mesesUsados=Object.keys(porMes).map(Number).sort((a,b)=>a-b);
  const maxMes=Math.max(...Object.values(porMes),1);
  html+=`<div class="section"><h2>Evolución mes a mes</h2><div class="months">`;
  mesesUsados.forEach(m=>{
    const v=porMes[m];
    const w=(v/maxMes*100).toFixed(0);
    html+=`<div class="mcard"><div class="m">${MESES[m]}</div><div class="v">${money(v)}</div>
      <div class="mbar" style="width:${w}%;background:${acc}"></div></div>`;
  });
  html+=`</div></div>`;

  // DETALLE (movimientos del periodo, orden seleccionable)
  const det=[...rows].sort((a,b)=>
    ordenMov==='monto' ? b.monto_usd-a.monto_usd : b.fecha.localeCompare(a.fecha)
  ).slice(0,40);
  const ordenTxt = ordenMov==='monto' ? '40 de mayor monto' : '40 más recientes';
  html+=`<div class="section">
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:16px">
      <h2 style="margin:0">Movimientos (${rows.length}) · mostrando ${ordenTxt}</h2>
      <select id="ordenMov" onchange="cambiarOrden()" style="font-size:13px;padding:7px 11px">
        <option value="monto"${ordenMov==='monto'?' selected':''}>Mayor a menor</option>
        <option value="fecha"${ordenMov==='fecha'?' selected':''}>Más reciente</option>
      </select>
    </div>
    <div style="overflow-x:auto"><table><thead><tr>
    <th>Fecha</th><th>Unidad</th><th>Motivo</th><th>Cuenta</th><th class="num">Monto</th>
    </tr></thead><tbody>`;
  det.forEach(r=>{
    html+=`<tr>
      <td>${r.fecha}</td>
      <td><span class="tag">${r.unidad}</span></td>
      <td>${r.motivo||'—'}</td>
      <td style="color:var(--muted)">${r.cuenta||'—'}</td>
      <td class="num" style="color:${acc};font-weight:600">${money(r.monto_usd)}</td>
    </tr>`;
  });
  html+=`</tbody></table></div></div>`;

  document.getElementById('content').innerHTML=html;
}

cargar();
</script>
</body>
</html>
